<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover"> 
<title>Tools World</title> 
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet"> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> 
<style> 
    * { margin: 0; padding: 0; box-sizing: border-box; } 
    body { font-family: 'Inter', sans-serif; background: #0a0f1c; height: 100vh; width: 100vw; overflow: hidden; position: fixed; top: 0; left: 0; } 
    .app { display: flex; flex-direction: column; height: 100%; width: 100%; background: #0e1322; } 
    .header { background: rgba(18, 25, 45, 0.96); backdrop-filter: blur(20px); padding: 0.7rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); flex-shrink: 0; } 
    .logo-area { display: flex; align-items: center; gap: 12px; } 
    .logo-icon { background: linear-gradient(135deg, #2a6f9c, #3b8fc2); width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; box-shadow: 0 8px 14px -6px rgba(0, 0, 0, 0.4); } 
    .active-site-name { font-size: 1rem; font-weight: 600; color: #eef4ff; background: rgba(96, 165, 250, 0.15); padding: 6px 14px; border-radius: 40px; letter-spacing: 0.3px; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } 
    .action-group { display: flex; gap: 12px; } 
    .action-btn { background: rgba(255, 255, 255, 0.06); border: none; width: 40px; height: 40px; border-radius: 40px; color: #ccddee; font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; } 
    .action-btn:hover { background: #2c3f5f; color: white; transform: scale(0.96); } 
    .main-layout { display: flex; flex: 1; overflow: hidden; } 
    .sidebar { width: 280px; background: rgba(12, 19, 33, 0.9); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; } 
    .sidebar-header { padding: 1.3rem 1rem 0.5rem 1.5rem; font-size: 0.85rem; text-transform: uppercase; color: #7e95b0; letter-spacing: 1px; font-weight: 600; display: flex; align-items: center; gap: 10px; } 
    .btn-list { display: flex; flex-direction: column; gap: 8px; padding: 0 1rem 1.5rem 1rem; } 
    .site-btn { background: rgba(25, 35, 55, 0.7); border: 1px solid rgba(72, 110, 144, 0.3); border-radius: 18px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: 0.2s; font-weight: 500; color: #eef4ff; text-align: left; } 
    .site-btn i { font-size: 1.1rem; color: #6ea8fe; } 
    .site-btn span { font-size: 0.95rem; } 
    .site-btn:hover { background: #1f314f; transform: translateX(4px); } 
    .site-btn.active { background: linear-gradient(95deg, #1e3a5f, #11263e); border-left: 3px solid #60a5fa; } 
    .webview-area { flex: 1; position: relative; background: #000; } 
    iframe { width: 100%; height: 100%; border: none; background: #ffffff; display: block; } 
    .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 30; display: none; } 
    .spinner { width: 44px; height: 44px; border: 3px solid rgba(100, 150, 220, 0.3); border-top: 3px solid #5f9eff; border-radius: 50%; animation: spin 0.7s linear infinite; } 
    @keyframes spin { to { transform: rotate(360deg); } } 
    .loading-overlay p { color: white; font-size: 0.8rem; } 
    .error-message { position: absolute; bottom: 20px; left: 20px; right: 20px; background: rgba(220, 50, 50, 0.9); backdrop-filter: blur(10px); color: white; padding: 12px 18px; border-radius: 16px; font-size: 0.75rem; z-index: 25; display: none; font-weight: 500; text-align: center; } 
    .menu-toggle { display: none; background: rgba(255, 255, 255, 0.08); border: none; color: white; font-size: 1.3rem; width: 42px; height: 42px; border-radius: 30px; margin-right: 10px; cursor: pointer; align-items: center; justify-content: center; } 
    @media (max-width: 760px) { .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 200; transition: left 0.2s ease; width: 260px; } .sidebar.open { left: 0; } .menu-toggle { display: flex; } .header { padding: 0.5rem 1rem; } .active-site-name { max-width: 150px; font-size: 0.85rem; } } 
    .fa-cog, .fa-gear, .fa-sliders-h, .fa-sliders, [class*="setting"], [aria-label*="setting"] { display: none !important; } 
    .sidebar::-webkit-scrollbar { width: 4px; } .sidebar::-webkit-scrollbar-track { background: #151e2c; } .sidebar::-webkit-scrollbar-thumb { background: #2f4b6e; border-radius: 8px; } 
</style> 

<div class="app">
    <div class="header"> 
        <div style="display: flex; align-items: center; gap: 12px;"> 
            <button class="menu-toggle" id="menuToggleBtn" aria-label="Menu"><i class="fas fa-bars"></i></button> 
            <div class="logo-area"> 
                <div class="logo-icon"><i class="fas fa-store"></i></div> 
                <div class="active-site-name" id="activeSiteName">Loading...</div> 
            </div> 
        </div> 
        <div class="action-group"> 
            <button class="action-btn" id="refreshActionBtn" title="Refresh"><i class="fas fa-sync-alt"></i></button> 
            <button class="action-btn" id="fullscreenActionBtn" title="Fullscreen"><i class="fas fa-expand"></i></button> 
        </div> 
    </div> 
    <div class="main-layout"> 
        <div class="sidebar" id="sidebarPanel"> 
            <div class="sidebar-header"><i class="fas fa-tools"></i> Tools World </div> 
            <div class="btn-list" id="buttonListContainer"></div> 
            <div style="padding: 1rem; font-size: 10px; color: #3e5a77; margin-top: auto;"> <i class="fas fa-lock"></i> Secured </div> 
        </div> 
        <div class="webview-area"> 
            <iframe id="webFrame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation allow-downloads"></iframe> 
            <div class="loading-overlay" id="loadingOverlayElem"> 
                <div class="spinner"></div> 
                <p>Loading...</p> 
            </div> 
            <div class="error-message" id="errorMsgElem"> 
                <i class="fas fa-exclamation-triangle"></i> Error loading page 
            </div> 
        </div> 
    </div> 
</div>

<script>
const websites = [ 
    { name: "Get Hotmail/outlook & Gmail Code", url: "https://hotmailoutlookgmail.primevault5682.site/", icons: ["fab fa-google", "fab fa-microsoft"] }, 
    { name: "Get 2Fa Code", url: "https://get2fa.primevault5682.site/", icons: ["fas fa-shield-alt"] }, 
    { name: "Facebook Id Live Check", url: "https://google.com/", icons: ["fab fa-facebook-f"] },
    { name: "HOTMAIL/OUTLOOK CHECK TOOLS", url: "https://google.com/", icons: ["fab fa-microsoft"] } 
]; 
const iframe = document.getElementById('webFrame'); 
const buttonContainer = document.getElementById('buttonListContainer'); 
const loadingOverlay = document.getElementById('loadingOverlayElem'); 
const errorMsgElem = document.getElementById('errorMsgElem'); 
const refreshBtn = document.getElementById('refreshActionBtn'); 
const fullscreenBtn = document.getElementById('fullscreenActionBtn'); 
const sidebarPanel = document.getElementById('sidebarPanel'); 
const menuToggleBtn = document.getElementById('menuToggleBtn'); 
const activeSiteNameSpan = document.getElementById('activeSiteName'); 
let currentActiveButton = null; 
let currentLoadedUrl = ""; 

function updateHeaderTitle(siteName) { 
    activeSiteNameSpan.textContent = siteName; 
    document.title = siteName + " - Tools World"; 
} 

function showLoading(show) { loadingOverlay.style.display = show ? "flex" : "none"; } 

function loadWebSite(url, clickedButton = null, siteName = "") { 
    if (!url) return; 
    if (url === currentLoadedUrl && iframe.src === url) { 
        iframe.contentWindow.location.reload(); 
        showLoading(true); 
        setTimeout(() => { showLoading(false); }, 1500); 
        return; 
    } 
    currentLoadedUrl = url; 
    showLoading(true); 
    errorMsgElem.style.display = "none"; 
    iframe.src = url; 
    if (siteName) { updateHeaderTitle(siteName); } 
    if (clickedButton) { 
        if (currentActiveButton) { currentActiveButton.classList.remove('active'); } 
        clickedButton.classList.add('active'); 
        currentActiveButton = clickedButton; 
    } 
} 

iframe.addEventListener('load', () => { showLoading(false); }); 

function renderButtons() { 
    buttonContainer.innerHTML = ''; 
    websites.forEach((site) => { 
        const btn = document.createElement('button'); 
        btn.className = 'site-btn'; 
        btn.setAttribute('data-url', site.url); 
        btn.setAttribute('data-name', site.name); 
        
        if (site.icons && site.icons.length > 0) { 
            site.icons.forEach(iconClass => { 
                const iconElem = document.createElement('i'); 
                iconElem.className = iconClass; 
                btn.appendChild(iconElem); 
            }); 
        } 
        
        const nameSpan = document.createElement('span'); 
        nameSpan.innerText = site.name; 
        btn.appendChild(nameSpan); 
        
        btn.addEventListener('click', (e) => { 
            e.preventDefault(); 
            loadWebSite(site.url, btn, site.name); 
            if (window.innerWidth <= 760) { sidebarPanel.classList.remove('open'); } 
        }); 
        buttonContainer.appendChild(btn); 
    }); 
    if (websites.length > 0) { 
        const firstSite = websites[0]; 
        const firstBtn = buttonContainer.querySelector('.site-btn'); 
        loadWebSite(firstSite.url, firstBtn, firstSite.name); 
    } 
} 

function refreshCurrentPage() { 
    if (iframe.src && iframe.src !== 'about:blank') { iframe.contentWindow.location.reload(); showLoading(true); } 
} 

function toggleAppFullscreen() { 
    const docEl = document.documentElement; 
    if (!document.fullscreenElement) { docEl.requestFullscreen(); fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>'; } 
    else { document.exitFullscreen(); fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>'; } 
} 

refreshBtn.addEventListener('click', refreshCurrentPage); 
fullscreenBtn.addEventListener('click', toggleAppFullscreen); 
renderButtons(); 

menuToggleBtn.addEventListener('click', (e) => { e.stopPropagation(); sidebarPanel.classList.toggle('open'); });
document.addEventListener('click', (e) => { if (window.innerWidth <= 760 && !sidebarPanel.contains(e.target) && !menuToggleBtn.contains(e.target)) { sidebarPanel.classList.remove('open'); } });
</script>
