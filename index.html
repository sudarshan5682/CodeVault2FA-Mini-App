<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🔐Tools World🛠️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0f1c; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        .app { display: flex; flex-direction: column; height: 100%; width: 100%; background: #0e1322; }
        .header { background: rgba(18, 25, 45, 0.96); backdrop-filter: blur(20px); padding: 0.7rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: linear-gradient(135deg, #2a6f9c, #3b8fc2); width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: white; }
        .active-site-name { font-size: 1rem; font-weight: 600; color: #eef4ff; background: rgba(96, 165, 250, 0.15); padding: 6px 14px; border-radius: 40px; }
        .action-group { display: flex; gap: 12px; }
        .action-btn { background: rgba(255, 255, 255, 0.06); border: none; width: 40px; height: 40px; border-radius: 40px; color: #ccddee; cursor: pointer; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: rgba(12, 19, 33, 0.9); border-right: 1px solid rgba(255, 255, 255, 0.05); overflow-y: auto; }
        .sidebar-header { padding: 1.3rem 1.5rem; font-size: 0.85rem; color: #7e95b0; text-transform: uppercase; }
        .btn-list { display: flex; flex-direction: column; gap: 8px; padding: 0 1rem; }
        .site-btn { background: rgba(25, 35, 55, 0.7); border: 1px solid rgba(72, 110, 144, 0.3); border-radius: 18px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #eef4ff; text-align: left; transition: 0.2s; }
        .site-btn:hover { background: #1f314f; }
        .site-btn.active { background: linear-gradient(95deg, #1e3a5f, #11263e); border-left: 3px solid #60a5fa; }
        .webview-area { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; background: #ffffff; }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; align-items: center; justify-content: center; color: white; z-index: 30; }
        @media (max-width: 760px) { .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 200; transition: left 0.2s; } .sidebar.open { left: 0; } }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="action-btn" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-store"></i></div>
                <div class="active-site-name" id="activeSiteName">লোড হচ্ছে...</div>
            </div>
        </div>
        <div class="action-group">
            <button class="action-btn" id="refreshActionBtn"><i class="fas fa-sync-alt"></i></button>
            <button class="action-btn" id="fullscreenActionBtn"><i class="fas fa-expand"></i></button>
        </div>
    </div>
    <div class="main-layout">
        <div class="sidebar" id="sidebarPanel">
            <div class="sidebar-header">🔐Tools World🛠️</div>
            <div class="btn-list" id="buttonListContainer"></div>
        </div>
        <div class="webview-area">
            <iframe id="webFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
            <div class="loading-overlay" id="loadingOverlayElem"><div class="spinner"></div> লোড হচ্ছে...</div>
        </div>
    </div>
</div>

<script>
    const websites = [
        { name: "Get Hotmail/outlook & Gmail Code", url: "https://ln.run/26zEy", icons: ["fab fa-google", "fab fa-microsoft"] },
        { name: "Get 2Fa Code", url: "https://dongvanfb.net/get2fa/", icons: ["fas fa-shield-alt"] },
        { name: "Facebook Id Live Check", url: "https://dongvanfb.net/check_live_uid/", icons: ["fab fa-facebook-f"] }
    ];

    const iframe = document.getElementById('webFrame');
    const buttonContainer = document.getElementById('buttonListContainer');
    
    function renderButtons() {
        websites.forEach((site) => {
            const btn = document.createElement('button');
            btn.className = 'site-btn';
            
            // আইকন যোগ করা
            let iconsHtml = site.icons.map(icon => `<i class="${icon}" style="width:20px;"></i>`).join(' ');
            btn.innerHTML = `${iconsHtml} <span>${site.name}</span>`;
            
            btn.onclick = () => {
                iframe.src = site.url;
                document.getElementById('activeSiteName').innerText = site.name;
                document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            buttonContainer.appendChild(btn);
        });
        // ডিফল্ট প্রথমটি লোড
        buttonContainer.firstChild.click();
    }

    document.getElementById('menuToggleBtn').onclick = () => document.getElementById('sidebarPanel').classList.toggle('open');
    document.getElementById('refreshActionBtn').onclick = () => iframe.src = iframe.src;
    document.getElementById('fullscreenActionBtn').onclick = () => document.documentElement.requestFullscreen();

    renderButtons();
</script>
</body>
</html>
